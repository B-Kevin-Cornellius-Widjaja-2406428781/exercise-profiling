
services:
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my-password
      POSTGRES_DB: advpro-2024
    volumes:
      - postgres-data:/var/lib/postgresql
    
  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
        
volumes:
  postgres-data: